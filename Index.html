<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Books Neural</title>
    <link rel="stylesheet" href="index/CSS/index.css">
</head>
<body>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar">
            <h1 class="logo">Web Books Neural</h1>
            <ul class="nav-links">
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#catalogo">Catálogo</a></li>
                <li><a href="#tendencias">Tendencias</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <!-- HERO -->
    <section id="inicio" class="hero">
        <div class="overlay">
            <h2>Explora el conocimiento del futuro</h2>
            <p>Descubre los libros más leídos en tecnología, ciencia e innovación</p>
        </div>
    </section>

    <!-- HOTLIST -->
    <section id="catalogo" class="hotlist">
        <h2>🔥 Libros en tendencia</h2>
        <div class="catalogo"></div>
    </section>

    <!-- VISOR DE LIBROS -->
    <div id="visor" class="visor oculto">
        <button onclick="cerrarVisor()">Cerrar ✖</button>
        <iframe id="frameLibro"></iframe>
    </div>

    <!-- SCRIPT -->
    <script>
    const libros = [
        {
            titulo: "Manual de Neurología",
    descripcion: "Guía para médicos y estudiantes",
    imagen: "/index/IMG/Manual_de_neurologia.png",
    pdf: "https://drive.google.com/file/d/1UwpL4VElvt6tfB3W49PyVkIVq-ZvBAEW/preview"
        },
        {
            titulo: "Neuroanatomia y neruofisiologia en psicologia",
            descripcion: "Neuroplasticidad y comportamiento",
            imagen: "/index/IMG/Neuroanatomia_y_neurofisiologia_en_Psicologia.png",
            pdf: "https://drive.google.com/file/d/10g-guk7jlfz4v1f1B9ES3kIx7q7wXXsm/preview"
        },
        {
            titulo: "Neurofisiologia Humana",
            descripcion: "Redes neuronales avanzadas",
            imagen: "/index/IMG/Neurofisiologia_Humana.png",
            pdf: "https://drive.google.com/file/d/1U6NAmwHF6xrTnBOAHMVPVfHGX7ivhN5e/preview"
        }
    ];

    const catalogo = document.querySelector(".catalogo");

    libros
    .filter(libro => libro.imagen && libro.pdf) // elimina vacíos
    .forEach(libro => {

        const card = document.createElement("div");
        card.classList.add("card");

        card.innerHTML = `
            <img src="${libro.imagen}" alt="${libro.titulo}">
            <h3>${libro.titulo}</h3>
            <p>${libro.descripcion}</p>
        `;

        // abrir libro
        card.addEventListener("click", () => {
            abrirLibro(libro.pdf);
        });

        catalogo.appendChild(card);
    });

    function abrirLibro(url) {
        document.getElementById("visor").classList.remove("oculto");
        document.getElementById("frameLibro").src = url;
    }

    function cerrarVisor() {
        document.getElementById("visor").classList.add("oculto");
        document.getElementById("frameLibro").src = "";
    }
    </script>

</body>
</html>
