<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Web Books Neural</title>
    <link rel="stylesheet" href="index/css/navbar.css">
    <link rel="stylesheet" href="index/css/catalogo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <section class="catalogo-section">
        <h2>🔥 Catálogo de Libros</h2>

        <!-- Buscador -->
        <input type="text" id="buscador" placeholder="Buscar libro...">

        <!-- Filtros -->
        <div class="filtro-container">
            <!-- Filtro por letras -->
            <div class="filtro-letras">
                <button class="letra" data-letra="all">Todos</button>
                <script>
                    for(let i=65;i<=90;i++){
                        document.write('<button class="letra" data-letra="'+String.fromCharCode(i)+'">'+String.fromCharCode(i)+'</button>');
                    }
                </script>
            </div>

            <!-- Filtro de Favoritos -->
            <div class="filtro-favoritos">
                <button id="btnFavoritos" class="btn-filter-favoritos">⭐ Ver Favoritos</button>
            </div>
        </div>

        <!-- Contenedor de cards -->
        <div class="catalogo"></div>

        <!-- Paginación -->
        <div class="paginacion">
            <button id="prev">◀ Anterior</button>
            <span id="paginaActual">1</span>
            <button id="next">Siguiente ▶</button>
        </div>
    </section>
<!-- Antes de tus scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js"></script>
<script src="index/js/firebase-config.js"></script>

<script src="index/js/navbar.js"></script>
<script src="index/js/db.js"></script>
<script src="index/js/catalogo.js"></script>
    <script src="index/js/navbar.js"></script>
    <script src="index/js/db.js"></script>
    <script src="index/js/catalogo.js"></script>
</body>
</html>
