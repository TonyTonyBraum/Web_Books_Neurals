<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Web Books Neural</title>
    <link rel="stylesheet" href="index/css/navbar.css">
    <link rel="stylesheet" href="index/css/footer.css">
    <link rel="stylesheet" href="index/css/catalogo.css">
    <!-- Font Awesome para iconos de redes sociales -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- La navbar se carga aquí dinámicamente -->

    <div class="container">
        <h1>📖 Catálogo de Libros</h1>
        
        <div class="filtros">
            <input type="text" id="busqueda" placeholder="🔍 Buscar libro..." class="input-busqueda">
            
            <div class="botones-filtros">
                <button class="btn-letra btn-activo" data-letra="Todos">Todos</button>
                <button class="btn-letra" data-letra="A">A</button>
                <button class="btn-letra" data-letra="B">B</button>
                <button class="btn-letra" data-letra="C">C</button>
                <button class="btn-letra" data-letra="D">D</button>
                <button class="btn-letra" data-letra="E">E</button>
                <button class="btn-letra" data-letra="F">F</button>
                <button class="btn-letra" data-letra="G">G</button>
                <button class="btn-letra" data-letra="H">H</button>
                <button class="btn-letra" data-letra="I">I</button>
                <button class="btn-letra" data-letra="J">J</button>
                <button class="btn-letra" data-letra="K">K</button>
                <button class="btn-letra" data-letra="L">L</button>
                <button class="btn-letra" data-letra="M">M</button>
                <button class="btn-letra" data-letra="N">N</button>
                <button class="btn-letra" data-letra="O">O</button>
                <button class="btn-letra" data-letra="P">P</button>
                <button class="btn-letra" data-letra="Q">Q</button>
                <button class="btn-letra" data-letra="R">R</button>
                <button class="btn-letra" data-letra="S">S</button>
                <button class="btn-letra" data-letra="T">T</button>
                <button class="btn-letra" data-letra="U">U</button>
                <button class="btn-letra" data-letra="V">V</button>
                <button class="btn-letra" data-letra="W">W</button>
                <button class="btn-letra" data-letra="X">X</button>
                <button class="btn-letra" data-letra="Y">Y</button>
                <button class="btn-letra" data-letra="Z">Z</button>
            </div>

            <button id="btnFavoritos" class="btn-favoritos">⭐ Ver Favoritos</button>
        </div>

        <div id="listaLibros" class="grid-libros">
            <p class="cargando">Cargando libros...</p>
        </div>

        <div class="paginacion">
            <button id="btnAnterior" class="btn-paginacion">← Anterior</button>
            <span id="numeroPagina" class="numero-pagina">1</span>
            <button id="btnSiguiente" class="btn-paginacion">Siguiente →</button>
        </div>
    </div>

    <!-- El footer se carga aquí dinámicamente -->

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <!-- Tu configuración -->
    <script src="index/js/navbar.js"></script>
    <script src="index/js/footer.js"></script>
    <script src="index/js/firebase-config.js"></script>
    <script src="index/js/catalogo.js"></script>
</body>
</html>
