<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Libro - Web Books Neural</title>
    <link rel="stylesheet" href="index/css/navbar.css">
    <link rel="stylesheet" href="index/css/footer.css">
    <link rel="stylesheet" href="index/css/libro-detalle.css">
    <!-- Font Awesome para iconos de redes sociales -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- La navbar se carga aquí dinámicamente -->

    <div class="container-detalle">
        <div class="libro-detalle">
            <div class="libro-portada">
                <img id="imagen" src="" alt="Portada">
            </div>
            <div class="libro-info-detalle">
                <h1 id="titulo">Título del Libro</h1>
                <p id="descripcion">Descripción del libro</p>
                <button id="btnDescargar" class="btn-descargar">📥 Descargar PDF</button>
            </div>
        </div>

        <div class="comentarios-seccion">
            <h2>💬 Comentarios</h2>
            
            <div class="form-comentario">
                <input type="text" id="nombreComentario" placeholder="Tu nombre" required>
                <textarea id="textoComentario" placeholder="Escribe tu comentario..." rows="5" required></textarea>
                <button id="btnComentario" class="btn-comentar">Enviar Comentario</button>
            </div>

            <div id="listaComentarios" class="lista-comentarios">
                <p class="cargando">Cargando comentarios...</p>
            </div>
        </div>
    </div>

    <!-- El footer se carga aquí dinámicamente -->

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <!-- Tu configuración -->
    <script src="index/js/navbar.js"></script>
    <script src="index/js/footer.js"></script>
    <script src="index/js/firebase-config.js"></script>
    <script src="index/js/libro-detalle.js"></script>
</body>
</html>
