<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Web Books Neural</title>
    <link rel="stylesheet" href="index/css/navbar.css">
    <link rel="stylesheet" href="index/css/footer.css">
    <link rel="stylesheet" href="index/css/admin.css">
    <!-- Font Awesome para iconos de redes sociales -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- La navbar se carga aquí dinámicamente -->

    <!-- Login -->
    <div id="loginContainer" class="login-container">
        <div class="login-box">
            <h1>🔐 Acceso Admin</h1>
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Contraseña" required>
            <button id="btnLogin" class="btn-login">Ingresar</button>
            <div id="loginError" class="error oculto"></div>
        </div>
    </div>

    <!-- Panel Admin -->
    <div id="adminContainer" class="admin-container oculto">
        <div class="header-admin">
            <h1>📚 Panel de Administración</h1>
            <button id="btnLogout" class="btn-logout">Cerrar Sesión</button>
        </div>
        
        <div class="formulario-container">
            <h2>Agregar Nuevo Libro</h2>
            
            <form id="formLibro" class="form-libro">
                <div class="form-group">
                    <label>Título del Libro:</label>
                    <input type="text" id="titulo" required placeholder="Ej: Manual de Neurología">
                </div>

                <div class="form-group">
                    <label>Descripción:</label>
                    <textarea id="descripcion" required placeholder="Descripción del libro..." rows="5"></textarea>
                </div>

                <div class="form-group">
                    <label>Portada (Imagen):</label>
                    <input type="file" id="portada" accept="image/*" required>
                    <small>Sube una imagen JPG o PNG</small>
                </div>

                <div class="form-group">
                    <label>Archivo PDF:</label>
                    <input type="file" id="pdf" accept=".pdf" required>
                    <small>Sube el archivo PDF del libro</small>
                </div>

                <button type="submit" class="btn-agregar">✨ Agregar Libro</button>
            </form>

            <div id="progreso" class="progreso oculto">
                <p>Cargando...</p>
                <div class="barra-progreso">
                    <div id="barraLlena" class="barra-llena"></div>
                </div>
            </div>

            <div id="mensaje" class="mensaje oculto"></div>
        </div>

        <div class="libros-container">
            <h2>📖 Libros en la Base de Datos</h2>
            <div id="listaLibros" class="lista-libros"></div>
        </div>
    </div>

    <!-- El footer se carga aquí dinámicamente -->

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <!-- Tu configuración -->
    <script src="index/js/navbar.js"></script>
    <script src="index/js/footer.js"></script>
    <script src="index/js/firebase-config.js"></script>
    <script src="index/js/admin.js"></script>
</body>
</html>
